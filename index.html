<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXG PRO PORTAL</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0e1015; color: #d1d4dc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #131722; padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid #2a2e39; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #ffffff; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: #8c93a1; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; background: #1e222d; border: 1px solid #2a2e39; color: white; border-radius: 6px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-green { background: #26a69a; color: white; }
        .btn-google { background: #ffffff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .section { display: none; }
        .admin-card { background: #1e222d; padding: 15px; margin-top: 10px; border-radius: 6px; border: 1px solid #2a2e39; display: flex; justify-content: space-between; align-items: center; }
        .member-card { background: #1e222d; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a2e39; }
    </style>
</head>
<body>

    <div class="container section" id="login-section" style="display: block;">
        <div class="header"><h2>FXG PORTAL</h2><p>Login to Access</p></div>
        <div class="input-group"><label>Username</label><input type="text" id="log-u"></div>
        <div class="input-group"><label>Password</label><input type="password" id="log-p"></div>
        <button class="btn btn-green" onclick="handleLogin()">Login</button>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('reg-section')">Register New Account</button>
        <button type="button" class="btn-google" id="google-login-btn">Sign in with Google</button>
    </div>

    <div class="container section" id="reg-section">
        <div class="header"><h2>REGISTER</h2></div>
        <div class="input-group"><label>Username</label><input type="text" id="new-u"></div>
        <div class="input-group"><label>Password</label><input type="password" id="new-p"></div>
        <button class="btn btn-green" onclick="handleRegister()">Register & Save</button>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('login-section')">Back</button>
    </div>

    <div class="container section" id="form-section">
        <div class="header"><h2>JOIN FXG TEAM</h2></div>
        <div class="input-group"><label>Full Name</label><input type="text" id="app-name"></div>
        <div class="input-group"><label>Age</label><input type="number" id="app-age"></div>
        <div class="input-group"><label>Exp (Years)</label><input type="number" id="app-exp"></div>
        <div class="input-group"><label>Instagram</label><input type="text" id="app-insta"></div>
        <div class="input-group">
            <label>Role</label>
            <select id="app-role">
                <option value="Lead Analyst">Lead Analyst (XAUUSD)</option>
                <option value="SMC Specialist">SMC Specialist</option>
                <option value="Independent Trader">Independent Trader</option>
            </select>
        </div>
        <div class="input-group"><label>Profile Photo</label><input type="file" id="app-photo" accept="image/*"></div>
        <button class="btn btn-green" onclick="submitApplication()">Submit Application</button>
        <button class="btn" onclick="show('members-dash')">Back to Members</button>
    </div>

    <div class="container section" id="members-dash" style="max-width: 800px;">
        <div class="header"><h2>FXG TEAM MEMBERS</h2></div>
        <button class="btn btn-green" onclick="show('form-section')">+ JOIN FXG TEAM</button>
        <div id="approved-list"></div>
        <button class="btn" style="margin-top:20px;" onclick="show('login-section')">Logout</button>
    </div>

    <div class="container section" id="owner-dash" style="max-width: 800px;">
        <div class="header"><h2>OWNER DASHBOARD</h2></div>
        <h3>Pending Applications</h3>
        <div id="pending-list"></div>
        <button class="btn" onclick="show('login-section')">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyDyfmvDid1o1-rzplifEE0R7X5lvv7gzFI", authDomain: "fxg-portal.firebaseapp.com", projectId: "fxg-portal", storageBucket: "fxg-portal.firebasestorage.app", messagingSenderId: "702222367751", appId: "1:702222367751:web:70a5dcbbcf5fb1465c7ea2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(() => show('members-dash')).catch(console.error);
        });
    </script>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function handleRegister() {
            localStorage.setItem('user_' + document.getElementById('new-u').value, document.getElementById('new-p').value);
            alert("Account created!"); show('login-section');
        }

        function handleLogin() {
            const u = document.getElementById('log-u').value;
            const p = document.getElementById('log-p').value;
            if(u === 'fxg.saurav' && p === 'Xauusd@123') { show('owner-dash'); renderPending(); }
            else if(localStorage.getItem('user_' + u) === p) { show('members-dash'); renderApproved(); }
            else alert("Invalid Credentials!");
        }

        function submitApplication() {
            const data = {
                name: document.getElementById('app-name').value,
                role: document.getElementById('app-role').value,
                exp: document.getElementById('app-exp').value,
                insta: document.getElementById('app-insta').value,
                status: 'pending'
            };
            localStorage.setItem('app_' + data.name, JSON.stringify(data));
            alert("Sent to Owner!"); show('members-dash');
        }

        function renderPending() {
            const list = document.getElementById('pending-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('app_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `<div class="admin-card">${d.name} (${d.role}) <button onclick="approve('${key}')">Approve</button></div>`;
                }
            }
        }

        function approve(key) {
            let d = JSON.parse(localStorage.getItem(key));
            d.status = 'approved';
            localStorage.setItem('member_' + d.name, JSON.stringify(d));
            localStorage.removeItem(key);
            alert("Member Approved!"); renderPending();
        }

        function renderApproved() {
            const list = document.getElementById('approved-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('member_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `<div class="member-card"><h3>${d.name}</h3><p>${d.role} | Exp: ${d.exp} | IG: ${d.insta}</p></div>`;
                }
            }
        }
    </script>
</body>
</html>
