<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fxg Portal</title>
    <style>
        /* GLOBAL STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0e1015; color: #d1d4dc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: #131722; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); width: 100%; max-width: 500px; border: 1px solid #2a2e39; }
        
        /* HEADERS */
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #ffffff; letter-spacing: 2px; font-size: 24px; margin-bottom: 5px; }
        .header p { color: #26a69a; font-size: 14px; }
        
        /* FORM ELEMENTS */
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        label { font-size: 13px; margin-bottom: 8px; color: #8c93a1; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background-color: #1e222d; border: 1px solid #2a2e39; color: #ffffff; padding: 12px; border-radius: 6px; font-size: 15px; outline: none; transition: all 0.3s; }
        input:focus, select:focus { border-color: #26a69a; box-shadow: 0 0 8px rgba(38, 166, 154, 0.3); }
        
        /* BUTTONS */
        .btn { color: #ffffff; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-green { background-color: #26a69a; }
        .btn-green:hover { background-color: #228b81; }
        .btn-google { background-color: #ffffff; color: #000000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background-color: #e2e2e2; }
        .btn-red { background-color: #ff5252; }
        
        /* MEMBERS GRID */
        .members-container { max-width: 800px; width: 100%; }
        .members-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .member-card { background-color: #1e222d; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #2a2e39; }
        .member-card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #26a69a; }
        .member-card h3 { color: #fff; font-size: 18px; }
        .member-card p { color: #8c93a1; font-size: 13px; margin-top: 5px; }

        /* DASHBOARD TABLE */
        .dashboard-container { max-width: 1000px; width: 100%; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #2a2e39; font-size: 14px; }
        th { color: #8c93a1; text-transform: uppercase; font-size: 12px; }
        .action-btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; }
        
        /* SECTIONS - Hidden by default except login */
        #members-section, #form-section, #dashboard-section { display: none; }
    </style>
</head>
<body>

    <!-- 1. LOGIN SECTION -->
    <div class="container" id="login-section">
        <div class="header">
            <h2>FXG PORTAL</h2>
            <p>Welcome to the community</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-green">Login</button>
            
            <button type="button" class="btn btn-google" onclick="alert('Google Login Simulation Active')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google">
                Sign in with Google
            </button>
        </form>
    </div>

    <!-- 2. MEMBERS VIEW SECTION -->
    <div class="container members-container" id="members-section">
        <div class="header">
            <h2>FXG TEAM MEMBERS</h2>
            <p>Elite Independent Traders</p>
        </div>
        
        <div class="members-grid">
            <!-- Dummy Member 1 -->
            <div class="member-card">
                <img src="https://via.placeholder.com/80/131722/26a69a?text=SMC" alt="Member">
                <h3>Vikas</h3>
                <p>SMC Specialist</p>
            </div>
            <!-- Dummy Member 2 -->
            <div class="member-card">
                <img src="https://via.placeholder.com/80/131722/26a69a?text=XAU" alt="Member">
                <h3>Aman</h3>
                <p>Lead Analyst - XAUUSD</p>
            </div>
            <!-- Dummy Member 3 -->
            <div class="member-card">
                <img src="https://via.placeholder.com/80/131722/26a69a?text=PRO" alt="Member">
                <h3>Rahul</h3>
                <p>Funded Trader</p>
            </div>
        </div>

        <button class="btn btn-green" onclick="showSection('form-section')" style="font-size: 18px; padding: 20px;">+ JOIN FXG TEAM</button>
        <button class="btn" style="background: transparent; color: #8c93a1; margin-top: 15px;" onclick="showSection('login-section')">Logout</button>
    </div>

    <!-- 3. APPLICATION FORM SECTION -->
    <div class="container" id="form-section">
        <div class="header">
            <h2>APPLICATION FORM</h2>
            <p>Independent Skills. Real Value.</p>
        </div>
        <form onsubmit="submitForm(event)">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter full name" required>
            </div>
            <div class="row">
                <div class="input-group"><label>Age</label><input type="number" placeholder="Age" required></div>
                <div class="input-group"><label>Exp (Years)</label><input type="number" placeholder="e.g., 3" required></div>
            </div>
            <div class="input-group">
                <label>Instagram Username</label>
                <input type="text" placeholder="@username" required>
            </div>
            <div class="input-group">
                <label>Role in Fxg Team</label>
                <select required>
                    <option value="" disabled selected>Select a role...</option>
                    <option>Lead Analyst</option>
                    <option>SMC Specialist</option>
                    <option>Independent Trader</option>
                    <option>Normal Member</option>
                </select>
            </div>
            <div class="input-group">
                <label>Profile Photo</label>
                <input type="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-green">Submit Application</button>
            <button type="button" class="btn" style="background: #2a2e39; margin-top: 10px;" onclick="showSection('members-section')">Back to Members</button>
        </form>
    </div>

    <!-- 4. OWNER DASHBOARD SECTION -->
    <div class="container dashboard-container" id="dashboard-section">
        <div class="header" style="text-align: left; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2>FXG OWNER DASHBOARD</h2>
            <button onclick="showSection('login-section')" class="action-btn" style="background-color: #2a2e39;">Logout</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Exp</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><img src="https://via.placeholder.com/40" style="border-radius: 50%;"></td>
                        <td>New User</td>
                        <td>20</td>
                        <td>2 Yrs</td>
                        <td>SMC Specialist</td>
                        <td>
                            <button class="action-btn btn-green">Approve</button>
                            <button class="action-btn btn-red">Reject</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Switch between UI sections
        function showSection(sectionId) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('members-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'none';
            
            document.getElementById(sectionId).style.display = 'block';
        }

        // Smart Login Logic
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            
            // If Owner logs in
            if(username.toLowerCase() === 'fxg.saurav') {
                showSection('dashboard-section');
            } 
            // If any other normal user logs in
            else {
                showSection('members-section');
            }
        }

        // Application Submission
        function submitForm(event) {
            event.preventDefault();
            alert("Application Submitted! It has been sent to the Owner's Dashboard.");
            event.target.reset(); // Clear form
            showSection('members-section'); // Send user back to members page
        }
    </script>
</body>
</html>
