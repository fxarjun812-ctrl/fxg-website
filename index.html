<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fxg Portal | Pro Team</title>
    <style>
        /* GLOBAL STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0e1015; color: #d1d4dc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: #131722; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); width: 100%; max-width: 500px; border: 1px solid #2a2e39; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #ffffff; letter-spacing: 2px; font-size: 24px; margin-bottom: 5px; }
        .header p { color: #26a69a; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }
        label { font-size: 13px; margin-bottom: 8px; color: #8c93a1; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background-color: #1e222d; border: 1px solid #2a2e39; color: #ffffff; padding: 12px; border-radius: 6px; font-size: 15px; outline: none; transition: all 0.3s; }
        input:focus, select:focus { border-color: #26a69a; box-shadow: 0 0 8px rgba(38, 166, 154, 0.3); }
        
        .btn { color: #ffffff; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-green { background-color: #26a69a; }
        .btn-green:hover { background-color: #228b81; }
        .btn-red { background-color: #ff5252; }
        .btn-google { background-color: #ffffff; color: #000000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 6px; padding: 12px; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: #8c93a1; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #2a2e39; }
        
        .members-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .member-card { background-color: #1e222d; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #2a2e39; }
        .member-card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #26a69a; }
        
        .dashboard-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background-color: #1e222d; color: #8c93a1; cursor: pointer; border-radius: 6px; font-weight: bold; border: 1px solid #2a2e39; }
        .tab-btn.active { background-color: #26a69a; color: #ffffff; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #2a2e39; font-size: 14px; }
        th { color: #8c93a1; text-transform: uppercase; font-size: 12px; }
        .action-btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; }
        
        #members-section, #form-section, #dashboard-section, #reg-section { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <div class="header">
            <h2>FXG PORTAL</h2>
            <p>Welcome back</p>
        </div>
        
        <form id="manual-login-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Passcode">
            </div>
            <button type="submit" class="btn btn-green">Login</button>
            <p id="error-msg" style="color: #ff5252; text-align: center; margin-top: 10px; display: none; font-size: 14px;">Invalid credentials</p>
        </form>

        <button class="btn" style="background: #2a2e39; color: #fff; margin-top: 10px;" onclick="showSection('reg-section')">Register New Account</button>

        <div class="divider">OR</div>

        <button type="button" class="btn-google" id="google-login-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="20" alt="Google">
            Sign in with Google
        </button>
    </div>

    <div class="container" id="reg-section">
        <div class="header"><h2>REGISTER</h2></div>
        <form id="reg-form">
            <div class="input-group"><label>Choose Username</label><input type="text" id="reg-username" required></div>
            <div class="input-group"><label>Choose Password</label><input type="password" id="reg-password" required></div>
            <button type="submit" class="btn btn-green">Complete Registration</button>
            <button type="button" class="btn" style="background: transparent;" onclick="showSection('login-section')">Back to Login</button>
        </form>
    </div>

    <div class="container members-container" id="members-section" style="max-width: 800px;">
        <div class="header">
            <h2>FXG TEAM MEMBERS</h2>
            <p id="user-greeting" style="color: #ffffff; font-weight: bold; margin-bottom: 10px; font-size: 18px;"></p>
        </div>
        <button class="btn btn-green" onclick="showSection('form-section')">+ JOIN FXG TEAM</button>
        <button class="btn" onclick="showSection('login-section')">Logout</button>
    </div>

    <div class="container" id="form-section">
        <div class="header"><h2>APPLICATION FORM</h2></div>
        <form id="application-form">
            <div class="input-group"><label>Full Name</label><input type="text" placeholder="Enter full name" required></div>
            <div class="row">
                <div class="input-group"><label>Age</label><input type="number" required></div>
                <div class="input-group"><label>Exp (Years)</label><input type="number" required></div>
            </div>
            <div class="input-group">
                <label>Role</label>
                <select id="user-role" required>
                    <option value="Lead Analyst">Lead Analyst (XAUUSD)</option>
                    <option value="SMC Specialist">SMC Specialist</option>
                    <option value="Independent Trader">Independent Trader</option>
                </select>
            </div>
            <button type="submit" class="btn btn-green">Submit</button>
            <button type="button" class="btn" onclick="showSection('members-section')">Back</button>
        </form>
    </div>

    <div class="container dashboard-container" id="dashboard-section" style="max-width: 800px;">
        <div class="header"><h2>OWNER DASHBOARD</h2></div>
        <div class="dashboard-tabs">
            <button class="tab-btn active" id="tab-pending" onclick="switchAdminView('pending')">Pending Forms</button>
            <button class="tab-btn" id="tab-members" onclick="switchAdminView('members')">Team Data</button>
        </div>
        <div id="pending-forms-view"><p>No pending forms.</p></div>
        <div id="team-data-view" style="display:none;">
            <table id="user-table">
                <thead><tr><th>User</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn" onclick="showSection('login-section')">Logout</button>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.container').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // Registration Logic
        document.getElementById('reg-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;
            localStorage.setItem('user_' + u, p);
            alert("Registered! Now Login.");
            showSection('login-section');
        });

        // Combined Login Logic (Admin + Members)
        document.getElementById('manual-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            
            // Admin Check
            if(u === 'fxg.saurav' && p === 'Xauusd@123') {
                showSection('dashboard-section');
                document.getElementById('error-msg').style.display = 'none';
            } 
            // Member Check
            else if(localStorage.getItem('user_' + u) === p) {
                document.getElementById('user-greeting').innerText = "Welcome back, " + u + "!";
                showSection('members-section');
                document.getElementById('error-msg').style.display = 'none';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        // Form Submit
        document.getElementById('application-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Submitted!");
            showSection('members-section');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyfmvDid1o1-rzplifEE0R7X5lvv7gzFI",
            authDomain: "fxg-portal.firebaseapp.com",
            projectId: "fxg-portal",
            storageBucket: "fxg-portal.firebasestorage.app",
            messagingSenderId: "702222367751",
            appId: "1:702222367751:web:70a5dcbbcf5fb1465c7ea2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then((result) => {
                document.getElementById('user-greeting').innerText = "Welcome, " + result.user.displayName + "!";
                showSection('members-section');
            });
        });
    </script>
</body>
</html>
