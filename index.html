<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXG PRO PORTAL</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0e1015; color: #d1d4dc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #131722; padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid #2a2e39; }
        .header { text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1e222d; border: 1px solid #2a2e39; color: white; border-radius: 6px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-green { background: #26a69a; color: white; }
        .section { display: none; }
        .member-card { background: #1e222d; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; gap: 15px; border: 1px solid #2a2e39; }
        .member-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container section" id="login-section" style="display: block;">
        <div class="header"><h2>FXG PORTAL LOGIN</h2></div>
        <input type="text" id="log-u" placeholder="Username">
        <input type="password" id="log-p" placeholder="Password">
        <button class="btn btn-green" onclick="handleLogin()">Login</button>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('reg-section')">Register</button>
    </div>

    <div class="container section" id="reg-section">
        <div class="header"><h2>REGISTER</h2></div>
        <input type="text" id="new-u" placeholder="Username">
        <input type="password" id="new-p" placeholder="Password">
        <button class="btn btn-green" onclick="handleRegister()">Sign Up</button>
        <button class="btn" onclick="show('login-section')">Back</button>
    </div>

    <div class="container section" id="members-dash">
        <div class="header"><h2>TEAM MEMBERS</h2></div>
        <button class="btn btn-green" onclick="show('form-section')">+ JOIN FXG TEAM</button>
        <div id="approved-list"></div>
        <button class="btn" style="margin-top:20px;" onclick="show('login-section')">Logout</button>
    </div>

    <div class="container section" id="form-section">
        <div class="header"><h2>JOIN FXG TEAM</h2></div>
        <input type="text" id="app-name" placeholder="Full Name">
        <input type="number" id="app-age" placeholder="Age">
        <input type="number" id="app-exp" placeholder="Experience (Years)">
        <input type="text" id="app-insta" placeholder="Instagram Username">
        <select id="app-role">
            <option value="Lead Analyst">Lead Analyst (XAUUSD)</option>
            <option value="SMC Specialist">SMC Specialist</option>
            <option value="Independent Trader">Independent Trader</option>
        </select>
        <input type="file" id="app-photo" accept="image/*">
        <button class="btn btn-green" onclick="submitApplication()">Submit Application</button>
    </div>

    <div class="container section" id="owner-dash">
        <div class="header"><h2>OWNER DASHBOARD</h2></div>
        <h3>Pending Applications</h3>
        <div id="pending-list"></div>
        <button class="btn" onclick="show('login-section')">Logout</button>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function handleRegister() {
            localStorage.setItem('user_' + document.getElementById('new-u').value, document.getElementById('new-p').value);
            alert("Registered!"); show('login-section');
        }

        function handleLogin() {
            const u = document.getElementById('log-u').value;
            const p = document.getElementById('log-p').value;
            if(u === 'fxg.saurav' && p === 'Xauusd@123') { show('owner-dash'); renderPending(); }
            else if(localStorage.getItem('user_' + u) === p) { show('members-dash'); renderApproved(); }
            else alert("Invalid!");
        }

        function submitApplication() {
            const data = {
                name: document.getElementById('app-name').value,
                role: document.getElementById('app-role').value,
                exp: document.getElementById('app-exp').value,
                status: 'pending'
            };
            localStorage.setItem('app_' + data.name, JSON.stringify(data));
            alert("Sent to Owner!"); show('members-dash');
        }

        function renderPending() {
            const list = document.getElementById('pending-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('app_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `<div class="admin-card">${d.name} (${d.role}) <button onclick="approve('${key}')">Approve</button></div>`;
                }
            }
        }

        function approve(key) {
            let d = JSON.parse(localStorage.getItem(key));
            d.status = 'approved';
            localStorage.setItem('member_' + d.name, JSON.stringify(d));
            localStorage.removeItem(key);
            alert("Approved!"); renderPending();
        }

        function renderApproved() {
            const list = document.getElementById('approved-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('member_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `<div class="member-card"><div><h3>${d.name}</h3><p>${d.role} | Exp: ${d.exp}</p></div></div>`;
                }
            }
        }
    </script>
</body>
</html>
