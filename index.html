<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXG PRO PORTAL | EXCLUSIVE TEAM</title>
    <style>
        /* FXG DESIGN SYSTEM - Dark, Professional, Trading Aesthetic */
        :root { --accent: #26a69a; --bg: #0e1015; --card: #131722; --border: #2a2e39; --text: #d1d4dc; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: var(--card); padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: #ffffff; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; color: #8c93a1; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; background: #1e222d; border: 1px solid var(--border); color: white; border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(38, 166, 154, 0.3); }
        .row { display: flex; gap: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-green { background: var(--accent); color: white; }
        .btn-green:hover { background: #1e877e; }
        .btn-google { background: #ffffff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-google:hover { background: #e2e2e2; }
        .section { display: none; }
        .admin-card { background: #1e222d; padding: 15px; margin-top: 10px; border-radius: 6px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .member-card { background: #1e222d; padding: 20px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 20px; }
        .member-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        #app-preview { max-width: 100px; margin-top: 10px; border-radius: 50%; display: none; }
    </style>
</head>
<body>

    <div class="container section" id="login-section" style="display: block;">
        <div class="header"><h2>FXG PORTAL</h2><p>Sign in to your trading hub</p></div>
        <div class="input-group"><label>Username</label><input type="text" id="log-u"></div>
        <div class="input-group"><label>Password</label><input type="password" id="log-p"></div>
        <button class="btn btn-green" onclick="handleLogin()">Login</button>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('reg-section')">Register</button>
        <button type="button" class="btn-google" id="google-login-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" width="20" alt="G">
            Sign in with Google
        </button>
    </div>

    <div class="container section" id="reg-section">
        <div class="header"><h2>REGISTER</h2></div>
        <div class="input-group"><label>Username</label><input type="text" id="new-u"></div>
        <div class="input-group"><label>Password</label><input type="password" id="new-p"></div>
        <button class="btn btn-green" onclick="handleRegister()">Register Account</button>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('login-section')">Back</button>
    </div>

    <div class="container section" id="form-section">
        <div class="header"><h2>JOIN FXG TEAM</h2></div>
        <form id="app-form">
            <input type="hidden" name="access_key" value="50b484ee-0759-4ef3-995f-e000c9c99513">
            <input type="hidden" name="subject" value="New FXG Team Application!">
            
            <div class="input-group"><label>Full Name</label><input type="text" name="name" id="app-name" required></div>
            <div class="row">
                <div class="input-group" style="flex:1"><label>Age</label><input type="number" name="age" id="app-age" required></div>
                <div class="input-group" style="flex:1"><label>Exp (Yrs)</label><input type="number" name="exp" id="app-exp" required></div>
            </div>
            <div class="input-group"><label>Instagram</label><input type="text" name="insta" id="app-insta" required></div>
            <div class="input-group">
                <label>Target Role</label>
                <select name="role" id="app-role">
                    <option value="Owner">Owner</option>
                    <option value="CEO">CEO</option>
                    <option value="Normal Member">Normal Member</option>
                </select>
            </div>
            <div class="input-group">
                <label>Profile Photo</label>
                <input type="file" id="photo-input" accept="image/*" onchange="previewImage(this)">
                <img id="app-preview" src="" alt="preview">
            </div>
            <button type="submit" class="btn btn-green">Submit Application</button>
        </form>
        <button class="btn" style="background:#2a2e39; color:white;" onclick="show('members-dash')">Cancel</button>
    </div>

    <div class="container section" id="members-dash" style="max-width: 800px;">
        <div class="header"><h2>TEAM MEMBERS</h2></div>
        <button class="btn btn-green" onclick="show('form-section')">+ JOIN FXG TEAM</button>
        <div id="approved-list"></div>
        <button class="btn" style="margin-top:20px; background:#2a2e39; color:white;" onclick="show('login-section')">Logout</button>
    </div>

    <div class="container section" id="owner-dash" style="max-width: 800px;">
        <div class="header"><h2>OWNER DASHBOARD (fxg.saurav)</h2></div>
        <h3>Pending Applications</h3>
        <div id="pending-list"></div>
        <button class="btn" style="margin-top:20px; background:#2a2e39; color:white;" onclick="show('login-section')">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyDyfmvDid1o1-rzplifEE0R7X5lvv7gzFI", authDomain: "fxg-portal.firebaseapp.com", projectId: "fxg-portal", storageBucket: "fxg-portal.firebasestorage.app", messagingSenderId: "702222367751", appId: "1:702222367751:web:70a5dcbbcf5fb1465c7ea2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(() => { show('members-dash'); renderApproved(); }).catch(console.error);
        });
    </script>

    <script>
        // --- Navigation ---
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // --- Auth ---
        function handleRegister() {
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            localStorage.setItem('user_' + u, p);
            alert("Account Registered!"); show('login-section');
        }

        function handleLogin() {
            const u = document.getElementById('log-u').value;
            const p = document.getElementById('log-p').value;
            if(u === 'fxg.saurav' && p === 'Xauusd@123') { show('owner-dash'); renderPending(); }
            else if(localStorage.getItem('user_' + u) === p) { show('members-dash'); renderApproved(); }
            else alert("Invalid Credentials!");
        }

        // --- Photo Conversion ---
        let base64Photo = "https://via.placeholder.com/80/131722/26a69a?text=FXG"; // Default image
        function previewImage(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Photo = e.target.result;
                    const prev = document.getElementById('app-preview');
                    prev.src = base64Photo;
                    prev.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        // --- Form Submit (Web3Forms + LocalStorage) ---
        const form = document.getElementById('app-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 1. Save to Dashboard
            const data = {
                name: document.getElementById('app-name').value,
                age: document.getElementById('app-age').value,
                exp: document.getElementById('app-exp').value,
                insta: document.getElementById('app-insta').value,
                role: document.getElementById('app-role').value,
                photo: base64Photo
            };
            localStorage.setItem('app_' + data.name, JSON.stringify(data));
            
            // 2. Send Email via Web3Forms
            fetch("https://api.web3forms.com/submit", { 
                method: "POST", 
                body: new FormData(form) 
            }).then(() => {
                alert("Application Submitted! Sent to Owner for Approval.");
                show('members-dash');
                form.reset();
                document.getElementById('app-preview').style.display = 'none';
            });
        });

        // --- Admin Dashboard ---
        function renderPending() {
            const list = document.getElementById('pending-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('app_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `<div class="admin-card">
                        <div><strong>${d.name}</strong><br><span style="color:var(--accent)">${d.role}</span></div> 
                        <button onclick="approve('${key}')" class="btn btn-green" style="width: auto; margin-top:0;">Approve</button>
                    </div>`;
                }
            }
        }

        function approve(key) {
            let d = JSON.parse(localStorage.getItem(key));
            localStorage.setItem('member_' + d.name, JSON.stringify(d));
            localStorage.removeItem(key);
            alert("Member Approved! Live on Dashboard.");
            renderPending();
        }

        // --- Members View ---
        function renderApproved() {
            const list = document.getElementById('approved-list'); list.innerHTML = "";
            for(let i=0; i<localStorage.length; i++) {
                let key = localStorage.key(i);
                if(key.startsWith('member_')) {
                    let d = JSON.parse(localStorage.getItem(key));
                    list.innerHTML += `
                        <div class="member-card">
                            <img src="${d.photo}" class="member-avatar">
                            <div>
                                <h3>${d.name}</h3>
                                <p style="color:var(--accent); font-weight:bold; margin-top:3px;">${d.role}</p>
                                <p style="font-size:12px; color:#8c93a1; margin-top:5px;">Exp: ${d.exp} Yrs | IG: @${d.insta}</p>
                            </div>
                        </div>`;
                }
            }
        }
    </script>
</body>
</html>
