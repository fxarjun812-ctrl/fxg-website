<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXG PRO | Elite Trading Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root { 
            --glass-bg: rgba(21, 26, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-1: #0072FF; 
            --accent-2: #00C6FF; 
            --bg-main: #05070a; 
            --text-main: #F8FAFC;
        }
        
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0;
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 114, 255, 0.15), transparent 60%);
        }

        /* PREMIUM GLASS CONTAINER */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .hero-logo { font-size: 5rem; font-weight: 800; letter-spacing: -2px; }
        .hero-logo span { background: linear-gradient(90deg, #0072FF, #00C6FF); -webkit-background-clip: text; color: transparent; }

        /* BUTTONS WITH NEON GLOW */
        .btn-primary {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 600;
            transition: 0.3s ease; box-shadow: 0 0 20px rgba(0, 114, 255, 0.3); cursor: pointer;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(0, 198, 255, 0.5); }

        /* MEMBER CARDS */
        .member-card {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 20px; transition: 0.4s;
        }
        .member-card:hover { border: 1px solid var(--accent-2); transform: translateY(-10px); }

        .member-avatar-wrap { width: 100%; height: 200px; border-radius: 16px; overflow: hidden; background: #000; }
        .member-avatar { width: 100%; height: 100%; object-fit: cover; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 10px; }
    </style>
</head>
<body>
    <!-- Tera purana JS aur structure wahi hai, bas style tags upar wale se replace kar de -->
    <!-- (Baaki logic wahi hai jo tune finalize kiya tha) -->
</body>
</html>
